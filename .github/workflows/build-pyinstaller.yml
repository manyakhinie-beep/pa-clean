# build-pyinstaller — альтернативный пайплайн сборки macOS .app через
# PyInstaller + PyWebView (без Rust/PyApp/cargo).
#
# Trigger: push в ветку packaging/pyinstaller** / workflow_dispatch.
#
# Артефакт: dist/PaClean.app + .dmg
#
# В отличие от build-pilot.yml (PyApp), здесь нет Rust шага и нет
# cargo install pyapp.  Это полностью pure-Python pipeline через
# pip + PyInstaller, что устраняет блокер с index.crates.io.

name: build-pyinstaller

on:
  push:
    branches:
      - 'packaging/pyinstaller**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: Verify arm64 runner
        run: |
          [[ "$(uname -m)" == "arm64" ]] || { echo "Need arm64"; exit 1; }

      # WebUI ассеты уже зачекинены — собирать не нужно, но проверим
      - name: Verify webui/dist present
        run: |
          test -f webui/dist/index.html || { echo "webui/dist missing"; exit 1; }

      - name: Install create-dmg (для красивого .dmg)
        run: brew install create-dmg

      - name: Build PaClean.app
        run: ./scripts/build_pyinstaller.sh --clean

      # Smoke-launch: запускаем в фоне, ждём 5 секунд, проверяем что жив.
      # Принцип тот же что в build-pilot.yml (без GNU timeout(1)).
      - name: Smoke-launch the bundle (5s window)
        run: |
          set +e
          ./dist/PaClean.app/Contents/MacOS/PaClean > smoke.log 2>&1 &
          pid=$!
          sleep 5
          if kill -0 "$pid" 2>/dev/null; then
              echo "✓ Bundle still running after 5s — smoke test passed"
              kill "$pid" 2>/dev/null || true
              wait "$pid" 2>/dev/null || true
              tail -20 smoke.log || true
              exit 0
          else
              echo "✗ Bundle exited within 5s — likely a crash"
              wait "$pid" 2>/dev/null
              echo "--- last 30 lines of smoke.log ---"
              tail -30 smoke.log || true
              exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: PaClean-pyinstaller-arm64-${{ github.sha }}
          path: |
            dist/PaClean.app
            dist/PaClean-*.dmg
          retention-days: 14
          if-no-files-found: error
